        <h1>CONTACT</h1>
        <div class="box">
            <div class="form-card">
                <form action="" method="post class="my-form">
                    <div class="contact-card">
                        <div class="contact-card-element">
                            <label for="email" class="contact">Adresse email</label> <br>
                            <input type="email" name="email" id="email" class="contact"> <br>
                        </div> <br>
            
                        <div class="contact-card-element">
                            <label for="subject" class="contact">Objet</label> <br>
                            <input type="text" name="subject" id="subject" class="contact"> <br>
                        </div> <br>

                        <div class="contact-card-element">
                            <label for="message" class="contact">Message</label> <br>
                            <textarea type="text" name="message" id="message" class="contact" rows="10"> 
                        </div> <br>
                    <input type="submit" value="Envoyer" class="contact">
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
